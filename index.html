<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hourly - Weekly planner</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">

      <!-- ── Header ─────────────────────────────────────────────── -->
      <header class="header">
        <div class="header-left">
          <h1 class="app-title">Hourly</h1>
          <span class="app-subtitle">Weekly template</span>
        </div>
        <div class="header-controls">
          <button class="reset-btn" id="btn-reset" aria-label="Reset the entire template">
            Reset template
          </button>
        </div>
      </header>

      <!-- ── Body: sidebar + week grid ─────────────────────────── -->
      <div class="body-layout">

        <!-- Left sidebar -->
        <aside class="left-sidebar" aria-label="Categories">

          <div class="sidebar-section-head">
            <span class="sidebar-heading">Categories</span>
            <button class="sidebar-add-btn" id="btn-new-cat" aria-label="Add new category">
              + Add
            </button>
          </div>

          <div class="cat-list" id="cat-list"></div>

          <div class="sidebar-divider"></div>

          <button class="eraser-row" id="eraser-btn" aria-pressed="false">
            <span class="eraser-icon" aria-hidden="true">⌫</span>
            <span class="eraser-label">Eraser</span>
          </button>

          <div class="sidebar-total" id="sidebar-total" hidden>
            <span class="sidebar-total-label">Week total</span>
            <span class="sidebar-total-value" id="sidebar-total-value"></span>
          </div>

        </aside>

        <!-- Week grid -->
        <div class="week-scroll" id="week-scroll"></div>

      </div>
    </div>

    <!-- ── New-category modal ─────────────────────────────────── -->
    <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true"
         aria-labelledby="modal-title" hidden>
      <div class="modal">
        <h2 class="modal-title" id="modal-title">New category</h2>
        <label class="modal-field-label" for="cat-name-input">Name</label>
        <input
          type="text" class="modal-input" id="cat-name-input"
          placeholder="e.g. Deep work" maxlength="40" autocomplete="off"
        />
        <div class="modal-field-label" id="color-label">Color</div>
        <div class="color-swatches" id="cat-color-swatches" role="listbox"
             aria-labelledby="color-label"></div>
        <div class="modal-actions">
          <div></div>
          <div class="modal-actions-right">
            <button class="modal-btn modal-btn-cancel" id="modal-cancel">Cancel</button>
            <button class="modal-btn modal-btn-save"   id="modal-create">Create</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Reset confirm dialog ───────────────────────────────── -->
    <div class="modal-overlay" id="confirm-overlay" role="dialog" aria-modal="true"
         aria-labelledby="confirm-title" hidden>
      <div class="modal modal-sm">
        <h2 class="modal-title" id="confirm-title">Reset template?</h2>
        <p class="confirm-msg">All time blocks will be cleared. Categories are kept.</p>
        <div class="modal-actions">
          <div></div>
          <div class="modal-actions-right">
            <button class="modal-btn modal-btn-cancel" id="confirm-cancel">Cancel</button>
            <button class="modal-btn modal-btn-danger" id="confirm-ok">Reset</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
