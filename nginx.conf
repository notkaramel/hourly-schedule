server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Serve pre-compressed assets when available
    gzip_static on;

    # Cache hashed static assets aggressively
    location ~* \.(js|css|woff2?|ico|png|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html must not be cached (enables instant deploys)
    location = /index.html {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback — all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
